<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StocKing - 股票行情</title>
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #1a2332;
            --accent-green: #00d9a5;
            --accent-red: #ff4757;
            --text-primary: #e8edf5;
            --text-secondary: #8b9dc3;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 20px; color: var(--accent-green); }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; background: var(--bg-card); border: none; border-radius: 8px; color: var(--text-secondary); cursor: pointer; }
        .tab.active { background: var(--accent-green); color: #000; }
        .card { background: var(--bg-card); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
        .stock-card { background: var(--bg-secondary); border-radius: 8px; padding: 12px; }
        .stock-card .name { font-weight: bold; margin-bottom: 4px; }
        .stock-card .code { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .stock-card .price { font-size: 20px; font-weight: bold; }
        .stock-card .change { font-size: 14px; }
        .up { color: var(--accent-green); }
        .down { color: var(--accent-red); }
        .market-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .market-card { background: var(--bg-card); border-radius: 8px; padding: 16px; text-align: center; }
        .market-card .label { font-size: 12px; color: var(--text-secondary); }
        .market-card .value { font-size: 24px; font-weight: bold; margin: 8px 0; }
        .market-card .pct { font-size: 14px; }
        @media (max-width: 600px) {
            .market-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📈 StocKing</h1>
        
        <div class="market-grid" id="marketSummary">
            <div class="loading">加载大盘数据...</div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="showTab('watchlist')">自选股</button>
            <button class="tab" onclick="showTab('zt')">涨停板</button>
        </div>
        
        <div id="watchlistTab">
            <div class="grid" id="stockList">
                <div class="loading">加载自选股...</div>
            </div>
        </div>
        
        <div id="ztTab" style="display:none">
            <div class="grid" id="ztList">
                <div class="loading">加载涨停股...</div>
            </div>
        </div>
    </div>

    <script>
        // 默认自选股
        let watchlist = JSON.parse(localStorage.getItem('watchlist')) || ['600519', '000001', '002594', '300750', '000858'];

        // 显示Tab
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('watchlistTab').style.display = tab === 'watchlist' ? 'block' : 'none';
            document.getElementById('ztTab').style.display = tab === 'zt' ? 'block' : 'none';
        }

        // 获取大盘指数 - 直接调用东方财富API（支持CORS）
        async function fetchIndex() {
            const container = document.getElementById('marketSummary');
            try {
                // 上证、深证、创业板
                const res = await fetch('https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=1.000001,0.399001,0.399006&fields=f2,f3,f12,f14');
                const data = await res.json();
                const list = data.data?.diff || [];
                
                container.innerHTML = list.map(item => {
                    const isUp = item.f3 >= 0;
                    return '<div class="market-card">' +
                        '<div class="label">' + item.f14 + '</div>' +
                        '<div class="value" style="color:' + (isUp ? 'var(--accent-green)' : 'var(--accent-red)') + '">' + (item.f2/100).toFixed(2) + '</div>' +
                        '<div class="pct ' + (isUp ? 'up' : 'down') + '">' + (isUp ? '▲' : '▼') + Math.abs(item.f3).toFixed(2) + '%</div>' +
                    '</div>';
                }).join('');
            } catch(e) {
                container.innerHTML = '<div class="loading">大盘数据加载失败</div>';
            }
        }

        // 获取自选股行情 - 直接调用东方财富API
        async function fetchWatchlist() {
            const container = document.getElementById('stockList');
            if (watchlist.length === 0) {
                container.innerHTML = '<div class="loading">暂无自选股</div>';
                return;
            }
            
            try {
                // 格式化代码：6开头=1.x，0/3开头=0.x
                const secids = watchlist.map(c => (c.startsWith('6') ? '1.' : '0.') + c).join(',');
                const res = await fetch('https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=' + secids + '&fields=f2,f3,f12,f14,f15,f16');
                const data = await res.json();
                const list = data.data?.diff || [];
                
                container.innerHTML = list.map(item => {
                    const isUp = item.f3 >= 0;
                    return '<div class="stock-card">' +
                        '<div class="name">' + item.f14 + '</div>' +
                        '<div class="code">' + item.f12 + '</div>' +
                        '<div class="price ' + (isUp ? 'up' : 'down') + '">' + (item.f2/100).toFixed(2) + '</div>' +
                        '<div class="change ' + (isUp ? 'up' : 'down') + '">' + (isUp ? '+' : '') + item.f3.toFixed(2) + '%</div>' +
                    '</div>';
                }).join('');
            } catch(e) {
                container.innerHTML = '<div class="loading">自选股加载失败</div>';
            }
        }

        // 获取涨停股 - 直接调用东方财富API
        async function fetchZT() {
            const container = document.getElementById('ztList');
            try {
                const res = await fetch('https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=50&po=1&np=1&fltt=2&invt=2&fid=f3&fs=m:90+t:2+f:!50&fields=f12,f14,f2,f3');
                const data = await res.json();
                const list = data.data?.diff || [];
                
                // 过滤只保留股票（排除ETF）
                const stocks = list.filter(s => /^[036]/.test(s.f12));
                
                container.innerHTML = stocks.slice(0, 30).map(item => {
                    return '<div class="stock-card">' +
                        '<div class="name">' + item.f14 + '</div>' +
                        '<div class="code">' + item.f12 + '</div>' +
                        '<div class="price up">' + (item.f2/100).toFixed(2) + '</div>' +
                        '<div class="change up">+' + item.f3.toFixed(2) + '%</div>' +
                    '</div>';
                }).join('');
            } catch(e) {
                container.innerHTML = '<div class="loading">涨停股加载失败</div>';
            }
        }

        // 初始化
        fetchIndex();
        fetchWatchlist();
        fetchZT();
        
        // 每30秒刷新
        setInterval(() => {
            fetchIndex();
            fetchWatchlist();
            fetchZT();
        }, 30000);
    </script>
</body>
</html>
